<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Acceleration Simulator</title>

    <!-- PWA Meta Tags -->
    <meta name="description" content="A realistic car acceleration simulator with physics modeling">
    <meta name="theme-color" content="#16213e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Car Sim">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Icons for iOS -->
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Car Acceleration Simulator</h1>
        </header>
        
        <nav class="tabs">
            <button class="tab-btn active" data-tab="car-specs">Car Specifications</button>
            <button class="tab-btn" data-tab="transmission">Transmission</button>
            <button class="tab-btn" data-tab="simulation">Simulation</button>
        </nav>

        <main class="tab-content">
            <!-- Tab 1: Car Specifications -->
            <section id="car-specs" class="tab-panel active">
                <!-- Content loaded by JavaScript -->
            </section>

            <!-- Tab 2: Transmission -->
            <section id="transmission" class="tab-panel">
                <!-- Content loaded by JavaScript -->
            </section>

            <!-- Tab 3: Simulation -->
            <section id="simulation" class="tab-panel">
                <!-- Content loaded by JavaScript -->
            </section>
        </main>
    </div>

    <!-- JavaScript Modules -->
    <script type="module" src="js/app.js"></script>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then((registration) => {
                        console.log('Service Worker registered:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
